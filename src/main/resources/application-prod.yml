spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 600000
      leak-detection-threshold: 20000
      validation-timeout: 5000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  devtools:
    restart:
      enabled: false

file:
  storage:
    location: ${FILE_STORAGE_PATH:/tmp/uploads}

ai:
  service:
    base-url: ${AI_SERVICE_URL}

app:
  base-url: ${APP_BASE_URL}
  cors:
    allowed-origins:
      - https://cittilenz.vercel.app

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: INFO
    com.civic_reporting.cittilenz: INFO