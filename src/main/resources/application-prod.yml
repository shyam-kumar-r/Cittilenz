spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: CittilenzHikariPool

      maximum-pool-size: 2
      minimum-idle: 1

      idle-timeout: 30000
      connection-timeout: 30000
      validation-timeout: 5000

      max-lifetime: 600000
      leak-detection-threshold: 20000

      connection-test-query: SELECT 1

      auto-commit: false
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

        jdbc:
          time_zone: UTC

  lifecycle:
    timeout-per-shutdown-phase: 30s

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true

          starttls:
            enable: true

          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  devtools:
    restart:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: never

file:
  storage:
    location: ${FILE_STORAGE_PATH:/tmp/uploads}

ai:
  service:
    base-url: ${AI_SERVICE_URL}

app:
  base-url: ${APP_BASE_URL}

  cors:
    allowed-origins:
      - https://cittilenz.vercel.app

jwt:
  secret: ${JWT_SECRET}

server:
  port: 8080

  shutdown: graceful

  tomcat:
    connection-timeout: 30s

logging:
  level:
    root: INFO
    com.civic_reporting.cittilenz: INFO
    com.zaxxer.hikari: WARN
    org.hibernate.SQL: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"