spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cittilenz_db
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false   # 🔥 DISABLED (clean logs)
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Kolkata

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ===============================
# 📁 FILE STORAGE (LOCAL)
# ===============================
file:
  storage:
    location: ./uploads

# ===============================
# 🤖 AI SERVICE (LOCAL)
# ===============================
ai:
  service:
    base-url: http://localhost:8000

# ===============================
# 🌍 APP CONFIG (DEV)
# ===============================
app:
  base-url: http://localhost:8080
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000

# ===============================
# 🧾 LOGGING (DEV)
# ===============================
logging:
  level:
    root: INFO
    com.civic_reporting.cittilenz: DEBUG