spring:
  jackson:
    time-zone: Asia/Kolkata

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  datasource:
    url: jdbc:postgresql://localhost:5432/cittilenz_db
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        globally_quoted_identifiers: true
        jdbc:
          time_zone: Asia/Kolkata

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.civic_reporting.cittilenz: INFO

resilience4j:
  ratelimiter:
    instances:
      issueFilterLimiter:
        limitForPeriod: 20
        limitRefreshPeriod: 1s
        timeoutDuration: 0

sla:
  scheduler:
    delay: 60000

file:
  storage:
    location: ./uploads

ai:
  service:
    base-url: http://localhost:8000

geocoding:
  enabled: true
  provider: nominatim
  rate-limit-per-second: 1
  timeout-ms: 5000
  user-agent: "cittilenz-backend/1.0 (shyamkumar71521@gmail.com)"
  base-url: "https://nominatim.openstreetmap.org/reverse"