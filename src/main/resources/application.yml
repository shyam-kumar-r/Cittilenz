spring:
  application:
    name: cittilenz

  profiles:
    active: dev

  jackson:
    time-zone: Asia/Kolkata

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  jpa:
    open-in-view: false
    properties:
      hibernate:
        globally_quoted_identifiers: true

server:
  port: 8080

# ===============================
# 🔒 Rate Limiter
# ===============================
resilience4j:
  ratelimiter:
    instances:
      issueFilterLimiter:
        limitForPeriod: 20
        limitRefreshPeriod: 1s
        timeoutDuration: 0

# ===============================
# ⏱ SLA Scheduler
# ===============================
sla:
  scheduler:
    delay: 300000

# ===============================
# 🌍 APP CONFIG (COMMON)
# ===============================
app:
  base-url: http://localhost:8080

# ===============================
# 📍 GEOCODING
# ===============================
geocoding:
  enabled: true
  provider: nominatim
  rate-limit-per-second: 1
  timeout-ms: 5000
  user-agent: "cittilenz-backend/1.0 (shyamkumar71521@gmail.com)"
  base-url: "https://nominatim.openstreetmap.org/reverse"

# ===============================
# 🔐 JWT
# ===============================
jwt:
  secret: {Your JWT-SECRET}
  expiration: 86400000

# ===============================
# 🧾 LOGGING (GLOBAL)
# ===============================
logging:
  level:
    root: INFO
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF