<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<style>
  @media (prefers-color-scheme: dark) {
    body { background-color: #0B1220 !important; }
    .container { background-color: #111827 !important; }
    .text { color: #E5E7EB !important; }
    .card { background-color: #1F2937 !important; }
  }
</style>

</head>

<body style="margin:0; padding:0; background:#F4F7FB; font-family:Arial, sans-serif;">

<table width="100%">
<tr>
<td align="center">

<table width="600" class="container"
style="background:#ffffff; margin:30px 0; border-radius:16px; overflow:hidden;">

<!-- HEADER (same) -->
<tr>
<td align="center"
style="background:linear-gradient(135deg,#1E3A8A,#0EA5A4); padding:35px; color:white;">

<img th:src="${logoUrl}" width="85"
style="border-radius:50%; background:white; padding:6px;" />

<h1> Cittilenz </h1>
<p>Turning What Matters Into Action</p>

</td>
</tr>

<!-- BODY (CHANGED) -->
<tr>
<td style="padding:30px;" class="text">

<h2>Hello <span th:text="${name}"></span>,</h2>

<p>
An escalated issue has been assigned to you.
</p>

<p>
This issue requires immediate attention due to prior delays.
</p>

<div style="background:#FEF3C7;padding:16px;border-radius:10px;">
<p><b>Issue:</b> <span th:text="${issueTitle}"></span></p>
</div>

<p style="margin-top:25px;font-size:14px;">
Regards,<br>
<b>Team Cittilenz</b>
</p>

</td>
</tr>

<!-- FOOTER -->
<tr>
<td align="center" style="padding:20px; font-size:12px; color:#999;">
© 2026 Cittilenz • All rights reserved
</td>
</tr>

</table>

</td>
</tr>
</table>

</body>
</html>
